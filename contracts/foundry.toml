[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = true
evm_version = "paris"
ffi = false
fs_permissions = [{ access = "read-write", path = "./deployments" }]
gas_reports = ["*"]
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "@openzeppelin/contracts-upgradeable/=lib/openzeppelin-contracts-upgradeable/contracts/",
    "@chainlink/contracts/=lib/chainlink/contracts/",
    "forge-std/=lib/forge-std/src/"
]

[fuzz]
runs = 512
seed = "0x1337"

[invariant]
runs = 256
depth = 64
fail_on_revert = false
call_override = false

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = false
int_types = "long"
quote_style = "double"
number_underscore = "thousands"

[rpc_endpoints]
arb_sepolia = "${ARB_SEPOLIA_RPC}"
op_sepolia = "${OP_SEPOLIA_RPC}"
base_sepolia = "${BASE_SEPOLIA_RPC}"
mainnet = "${MAINNET_RPC}"
sepolia = "${SEPOLIA_RPC}"

[etherscan]
arb_sepolia = { key = "${ARBISCAN_API_KEY}", chain = 421614 }
op_sepolia = { key = "${OPTIMISTIC_ETHERSCAN_API_KEY}", chain = 11155420 }
base_sepolia = { key = "${BASESCAN_API_KEY}", chain = 84532 }

[profile.coverage]
via_ir = true

[profile.default]
coverage_no_match = ["script/**", "src/libs/YulMath.sol"]