name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

env:
  FOUNDRY_PROFILE: default

jobs:
  contracts:
    name: Contracts (build · test · coverage · slither · lint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: forge fmt --check
        run: forge fmt --check

      - name: forge install
        run: forge install --no-commit

      - name: forge build
        run: forge build --sizes

      - name: forge test
        run: forge test -vv --no-match-path "test/fork/**"

      - name: forge coverage
        run: forge coverage --report lcov --no-match-path "test/fork/**" --report-file=lcov.info

      - name: Set up Python (Slither)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Slither
        run: pip install slither-analyzer==0.10.4

      - name: Slither
        run: slither . --config-file slither.config.json

      - name: solhint (lint)
        run: |
          npm install --no-save solhint
          npx solhint 'src/**/*.sol'

  frontend:
    name: Frontend (lint · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - run: npm install --no-audit --no-fund

      - run: npx prettier --check "src/**/*.{ts,tsx,css}"

      - run: npm run build
        env:
          NEXT_PUBLIC_WALLETCONNECT_ID: ci
          NEXT_PUBLIC_SUBGRAPH_URL: https://example.com

  subgraph:
    name: Subgraph (codegen · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: subgraph
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install
        run: npm install --no-audit --no-fund

      - name: Note about ABIs
        run: |
          echo "Subgraph codegen requires real ABIs; in CI we skip codegen because contracts/ is not built here."
          echo "This job only validates package.json + tooling install."
